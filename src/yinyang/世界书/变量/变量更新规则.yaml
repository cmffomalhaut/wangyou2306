---
变量更新规则:
  # ==========================================================
  # ⚠️ 核心逻辑锁 (SYSTEM FORCE CHECK)
  # ==========================================================
  _系统强制校验:
    type: instruction
    check:
      - "**数值计算铁律**: JSON Patch 不支持数学运算！AI必须在 `<Analysis>` 阶段自行计算出【最终结果】，然后将【最终结果】填入 `value`。"
      - "**示例**: 好感度50+5 -> Analysis计算55 -> value写55。严禁写增量！"
      - "**新战姬铁律**: 在新出现战姬角色时候，必须战斗前生成新战姬数据，生成数据时，**必须输出** [等级/品质/资质/元素属性/着装/个人资料/战斗类型/性格/技能]；**严禁输出** [生命值/法力值/经验值/攻击力/防御力/特攻/特防/速度]，这些字段全部填0，等待脚本计算。"
      - "**事件驱动**: 触发特殊事件时更新 `current_event`，事件结束后清空。"

  _新战姬生成检查清单:
    type: instruction
    强制输出字段_核心基因:
      - "**等级**: **【铁律】初始获得（召唤/野外捕捉）的战姬必须是Lv.1！只有夺取的敌方战姬可以保留原等级**"
      - "**品质**: E/D/C/B/A（S级不可直接生成），**严禁使用默认值**"
      - "**资质**: 平庸/普通/优秀/天才，**必填**"
      - "**元素属性**: 地/火/水/风/光/暗，**根据设定明确填写**"
      - "**战斗类型**: 强攻型/重盾型/魔导型/敏捷型/均衡型"
      - "**性格**: 从21种性格中选择（固执/内敛/胆小...）"
      - "**变化形态**: 初始必为'无'"
      - "**从属训练家**: 玩家名（己方战姬）或敌方训练家名字（敌方战姬）"
      - "**归属状态**: '出战'（正在战斗）/'已储存'（在收藏室）/'离场'（已释放/死亡），默认'出战'"
      - "**好感度**: 根据获取方式计算初始值"
      - "**堕落值**: 根据出身/经历/特质计算初始值"
      - "**技能**: 根据<rule_战姬技能>生成，第一技能必须是主动攻击且无CD"
      - "**着装**: 上装/下装/内衣/鞋袜/饰品，**内衣必填**"
      - "**战斗衣着**: 根据角色原身份和元素属性设定固定战斗服"
      - "**个人资料**: 原身份/捕获经过/过往经历/与训练家关系/喜好体位/性癖/性格特征"
      - "**性器状态**: 各部位开发度+当前状态描述"
在新出现战姬角色时候，必须战斗前生成新战姬数据
    严禁输出字段_脚本计算:
      说明: "以下字段全部填0或使用默认结构，等待Zod脚本计算"
      禁止字段:
        - "生命值: { 当前值: 0, 最大值: 0 }"
        - "法力值: { 当前值: 0, 最大值: 0 }"
        - "经验值: { 当前值: 0, 升级所需值: 100 }"
        - "攻击力: 0"
        - "防御力: 0"
        - "特攻: 0"
        - "特防: 0"
        - "速度: 0"

  _夺取战姬检查清单:
    type: instruction
    触发条件: 战后裁决中成功俘获敌方战姬
    强制检查:
      - "**等级保留**: 夺取敌方战姬时，**必须保留原等级**，严禁重置为1级"
      - "**经验值同步**: 若要保留等级，**必须同步输出经验值.当前值**，否则脚本会因默认值0而重算为1级"
      - "**技能保留**: 夺取战姬时，**必须保留原技能列表**"
      - "**装备保留**: 夺取战姬时，**必须保留原着装数据**"
      - "**性器状态保留**: 夺取战姬时，**必须保留性器状态的所有开发度和描述**"
    Analysis中必须明确:
      - "Captured enemy character [名字], must preserve level [原等级] by outputting current exp [数值]"

  _强制更新检查:
    type: instruction
    check:
      - "**每次回复末尾必须检查**:"
      - "  1. 时间是否需要推进？（场景切换/行动完成/对话结束）"

      - "  2. 日期/星期是否需要更新？（跨越24:00）"
      - "  3. 着装是否需要更新？（战斗/换装/H场景）"
      - "  4. 当前交互对象是否变化？（current_target）"
      - "  5. 新战姬登场时，是否在在新出现战姬角色时候，必须战斗前生成新战姬数据？且输出了完整核心基因？"
      - "  6. 新战姬是否符合等级规则？（召唤/捕捉=Lv.1，夺取=保留原等级）"
      - "**即使数值不变，也要在Analysis中明确说明「无需更新」的理由**"

  # ==========================================================
  # 全局控制指针
  # ==========================================================
  current_target:
    check:
      - 记录当前正在交互/对话的战姬名字
      - 对话对象切换时必须立即更新
      - 无交互对象时置空

  current_event:
    check:
      - 记录当前正在进行的特殊事件ID
      - 事件触发时更新，事件结束后清空
      - 示例: '特殊事件_初次亲吻', '特殊事件_形态觉醒'

  玩家名:
    check:
      - 训练家的名字
      - 默认值: "lin"
      - "**初始化时机**: 游戏开始时，若用户自报姓名，立即更新为用户提供的名字"
      - "**更新方式**: 使用 replace 操作"

  # ==========================================================
  # 世界与资源
  # ==========================================================
  世界:
    时间:
      format: "HH:MM"
      check:
        - "**必须在每次回复时推进时间**"
        - "时间推进规则:"
        - "  - 简短对话: +5~15分钟"
        - "  - 完整交互/小事件: +30分钟~1小时"
        - "  - 战斗: +30分钟~2小时（视战斗规模）"
        - "  - 移动/旅行: 根据距离合理推算"
        - "  - H场景: +1~3小时"
        - "  - 休息/睡眠: 直接跳至次日早晨"
        - "**严禁时间静止！每次互动必须有时间流逝**"

    日期:
      format: "YYYY年M月D日"
      check:
        - 初始值: "2022年5月8日"
        - 时间跨越24:00时，日期+1天
        - 月份和日期不补零
        - "**日期变化会触发脚本自动结算**（收藏室好感度+HP/MP恢复、工作区金币产出），AI只需更新日期即可"

    星期:
      type: enum ('周一', '周二', '周三', '周四', '周五', '周六', '周日')
      check:
        - 初始值: "周日" (2022年5月8日)
        - "**必须跟随日期联动更新**"
        - 日期+1天时: 周日->周一->周二->...->周六->周日

    地点:
      check:
        - 记录当前所在位置
        - 移动时必须更新
        - 具体到建筑/区域级别

    天气:
      check:
        - 根据季节和剧情合理变化
        - 非关键信息，可保持不变

    近期事务:
      check:
        - 记录当前正在进行的主要活动
        - 用于AI判断场景状态（战斗中/日常/紧急）
        - 活动结束后更新为下一个事务或'无'

    _上次结算日期:
      type: readonly string
      check:
        - "**只读字段，由脚本自动维护，AI严禁修改**"
        - 用于防止同一天重复结算

  金币:
    type: number
    check:
      - "**AI必算**: 新金币 = 旧金币 ± 变动值"
      - "**增加来源**: 战斗胜利(+100~500), 任务完成(+50~2000), 出售道具, 工作区产出（日常结算自动）"
      - "**减少来源**: 商店购买, 据点升级, 融合消耗。不可使用在日常生活，无法买日常生活用品。日常生活购买支出视为0.日常买东西花的是日元，默认有足够的钱。"

  背包:
    type: |-
      {
        [物品名: string]: {
          描述: string;
          数量: number;
        }
      }
    check:
      - "**获得道具**: 使用add操作添加新道具，或replace操作增加现有道具数量"
      - "**消耗道具**: 使用replace操作将数量-1，数量归零时脚本自动移除"
      - "**捕捉球铁律**: 捕捉前必须检查背包中是否有对应捕捉球，无球时无法捕捉"

  收藏室:
    type: array of string
    check:
      - "**由脚本自动维护**: 根据战姬的`归属状态`自动生成列表"
      - "**严禁直接修改此数组！只修改战姬的归属状态即可**"

  # ==========================================================
  # 训练家模块
  # ==========================================================
  训练家:
    身份:
      check:
        - "**社会身份**: 训练家在现实社会中的身份（如学生、上班族等）"
        - "**称号格式**: 获得称号时，追加在身份后，格式为「称号名」(效果，至X年X月X日)"
        - "**过期处理**: 日常结算时检查称号持续时间，过期则从身份字符串中移除"

    等级:
      type: number
      range: 1~100
      check:
        - "**严禁AI修改！由脚本根据经验值自动计算**"

    经验值:
      type: |-
        { 当前值: number, 升级所需值: number }
      check:
        - "**AI必算**: 当前值 = 旧值 + 获得经验"
        - "**累计制**: 只增不减，严禁清空"
        - "**来源**: 战斗胜利(+50~200), 任务完成(+100~500), 首次捕获(+100)"
        - "**升级所需值**: 由脚本自动计算，AI无需修改"

    技能.${技能名}:
      type: |-
        {
          类型: '主动' | '被动';
          稀有度: '普通' | '稀有' | '史诗' | '传说' | '神话';
          获取途径: string;
          解锁条件: string;
          已解锁: boolean;
          冷却回合: number;
          使用次数: number;
          描述: string;
          效果: string;
          效果公式: string;
          数值参数: { [参数名: string]: number };
        }
      check:
        - "**解锁判定**: 满足解锁条件后将`已解锁`改为true"
        - "**冷却管理**: 使用后冷却回合-1，归零后可再次使用"
        - "**使用次数**: 有限次数技能使用后-1，归零后无法使用"

    特殊装备:
      type: |-
        Array<{
          名称: string;
          稀有度: '普通' | '稀有' | '史诗' | '传说' | '神话';
          获取途径: string;
          描述: string;
          效果: string;
          效果公式: string;
          数值参数: { [参数名: string]: number };
        }>
      check:
        - "**数量限制**: 最多保留3个，超出时脚本自动保留最新的3个"
        - "**添加装备**: 使用add操作添加新装备"
        - "**卸下装备**: 使用remove操作移除指定位置装备（path: /训练家/特殊装备/0）"

    据点.已解锁:
      type: boolean
      check:
        - "**Lv.5自动解锁（脚本处理）**"
        - AI无需手动更新此字段

    据点.收藏室:
      已解锁:
        type: boolean
        check: "**据点解锁后自动解锁（脚本处理）**，AI无需修改"

      等级:
        type: number
        range: 0~5
        check:
          - "**升级**: 支付升级费用后等级+1"
          - "**脚本自动计算**: 容量上限、每日好感加成、当前效果、升级费用由脚本根据等级自动更新"

      当前使用:
        type: array of string
        check:
          - "**存放战姬**: 将战姬的`归属状态`改为'已储存'，脚本会自动将其加入此列表"
          - "**取出战姬**: 将战姬的`归属状态`改为'出战'，脚本会自动将其从列表移除"
          - "**严禁直接add/remove此数组！通过修改战姬归属状态来间接操作**"

      容量上限:
        type: readonly number
        check: "**只读，由脚本根据等级自动计算**（Lv1:5, Lv2:10, Lv3:30, Lv4:50, Lv5:100）"

      每日好感加成:
        type: readonly number
        check: "**只读，由脚本根据等级自动计算**（Lv1:1, Lv2:2, Lv3:3, Lv4:4, Lv5:5）"

      当前效果:
        type: readonly string
        check: "**只读，由脚本自动生成描述**"

      升级费用:
        type: readonly number
        check: "**只读，由脚本根据等级自动计算**（Lv0→1:1000, Lv1→2:3000, Lv2→3:8000, Lv3→4:20000, Lv4→5:0）"

    据点.工作区:
      已解锁:
        type: boolean
        check:
          - "**解锁判定**: 满足解锁条件后改为true"
          - "**默认解锁方式**: 任务解锁"

      解锁条件:
        check: 描述解锁所需完成的任务或条件

      等级:
        type: number
        range: 0~5
        check:
          - "**升级**: 支付升级费用后等级+1"
          - "**脚本自动计算**: 名称、容量上限、效果数值、当前效果、升级费用由脚本根据等级自动更新"

      当前使用:
        type: array of string
        check:
          - "**分配战姬**: 使用add操作向数组添加战姬名字"
          - "**撤回战姬**: 使用remove操作从数组移除战姬名字"
          - "**容量检查**: 添加前检查length是否已达容量上限"

      名称:
        type: readonly string
        check: "**只读，由脚本根据等级自动更新**"

      容量上限:
        type:  readonly number
        check: "**只读，由脚本根据等级自动计算**"

      效果数值:
        type: readonly number
        check: "**只读，由脚本根据等级自动计算**（每人每日产出金币）"

      当前效果:
        type: readonly string
        check: "**只读，由脚本自动生成描述**"

      升级费用:
        type: readonly number
        check: "**只读，由脚本根据等级自动计算**"

  # ==========================================================
  # 任务系统
  # ==========================================================
  任务列表.${任务ID}:
    type: |-
      {
        名称: string;
        要求: string;
        奖励: string;
        类型: '日常任务' | '周常任务' | '剧情任务' | '限时任务';
        期限: string;
        已完成: boolean;
        已过期: boolean;
        进度: string;
        标签: string[];
      }
    check:
      - "**接取任务**: 使用add操作添加新任务"
      - "**完成判定**: 达成要求后`已完成`改为true，发放奖励"
      - "**过期判定**: 超过期限时`已过期`改为true"
      - "**进度更新**: 根据玩家行为更新进度描述（如'0/3' -> '1/3'）"
      - "**脚本自动清理**: 已完成或已过期的任务会被脚本自动移除，AI无需手动remove"

  # ==========================================================
  # 角色数据通用规则
  # ==========================================================
  角色数据.${角色名}:
    状态:
      type: enum ('正常', '濒死', '死亡', '异常')
      check:
        - HP归零变'濒死'
        - 治疗后变'正常'
        - 特殊状态（石化/封印等）变'异常'

    从属训练家:
      check:
        - "**新战姬必须明确填写**: 玩家名（己方）或敌方训练家名字"
        - 俘获/夺取时更新为新主人名字
        - 释放时置空

    归属状态:
      type: enum ('出战', '已储存', '离场')
      check:
        - "**新战姬默认**: '出战'"
        - 存入收藏室: 改为'已储存'
        - 取出收藏室: 改为'出战'
        - 释放/死亡: 改为'离场'

    个人资料:
      原身份:
        check: "**新战姬必填**: 成为战姬前的社会身份（学生/教师/OL/偶像等）"

      捕获经过:
        check: "**新战姬必填**: 如何被捕获的经过（系统召唤/战斗俘获/野外捕捉等）"

      过往经历:
        check: "**新战姬必填**: 影响性格的背景故事"

      与训练家关系:
        check:
          - "**新战姬必填**: 陌生人/俘虏/契约者/女友/性奴等"
          - 关系发展时更新（如俘虏->女友）

      喜好体位:
        check:
          - "**初始化**: 根据调教经历填写，未调教填'未知'"
          - H场景后根据战姬反应更新

      性癖:
        check:
          - "**初始化**: 根据性格和经历填写，纯洁角色填'未知'"
          - 调教后根据开发方向更新

      性格特征:
        check: "**新战姬必填**: 详细描述性格特点，影响对话和反应"

    等级:
      type: number
      range: 1~100
      check:
        - "**【核心铁律】初始获得方式与等级设定**:"
        - "  - **召唤获得**: 等级必须填1"
        - "  - **野外捕捉**: 等级必须填1"
        - "  - **夺取敌方**: 保留原等级，并同步输出经验值.当前值"
        - "**脚本自动计算**: 战姬升级后等级由脚本根据经验值自动计算，AI严禁修改"

    品质:
      type: enum ('E', 'D', 'C', 'B', 'A', 'S')
      check:
        - "**新战姬必须明确填写，严禁使用默认值'E'**"
        - 品质提升时更新（融合成功或使用品质提升石）

    资质:
      type: enum ('天才', '优秀', '普通', '平庸')
      check: "**新战姬必填，影响属性成长**"

    性格:
      type: enum ('固执', '孤僻', '勇敢', '调皮', '内敛', '稳重', '冷静', '马虎', '胆小', '急躁', '开朗', '天真', '大胆', '悠闲', '淘气', '温和', '自大', '慎重', '认真', '坦率', '害羞')
      check:
        - "**🚨 新战姬生成时必须填写！**"
        - "**影响属性倾向**:"
        - "  攻击系(固执/孤僻/勇敢/调皮): +攻击 -其他"
        - "  特攻系(内敛/稳重/冷静/马虎): +特攻 -其他"
        - "  速度系(胆小/急躁/开朗/天真): +速度 -其他"
        - "  防御系(大胆/悠闲/淘气): +防御 -其他"
        - "  特防系(温和/自大/慎重): +特防 -其他"
        - "  均衡系(认真/坦率/害羞): 无修正"

    战斗类型:
      type: enum ('均衡型', '强攻型', '重盾型', '魔导型', '敏捷型')
      check: "**新战姬必填**: 影响属性分配，一般不变"

    元素属性:
      type: enum ('地', '火', '水', '风', '光', '暗')
      check: "**新战姬必须明确填写，根据设定选择，严禁使用默认值'地'**"

    好感度:
      type: number
      range: -100 ~ 200
      check:
