---
变量更新规则:
  _系统强制校验:
    type: instruction
    check:
      - '**核心原则**: 本角色卡使用 `stat_data` 作为唯一状态源；变量更新必须只围绕 `stat_data` 已定义字段进行。'
      - '**数值计算铁律**: JSON Patch 不支持数学表达式；必须先在 `<Analysis>` 中算出最终值，再写入 patch。'
      - '**路径铁律**: 只允许更新 Schema 中已存在的长期字段，或按规则新增允许扩展的对象键；禁止发明新根字段。'
      - '**只读铁律**: 所有以下划线 `_` 开头字段、脚本自动生成字段、运行时战斗结算字段都视为只读。'
      - '**战斗脚本铁律**: 一旦进入
        `stat_data.战斗状态`，战斗中的检定、伤害、治疗、状态、冷却、行动顺序、奖励结算全部由脚本负责。'
      - '**AI职责铁律**: AI 只负责叙事、非战斗长期数据维护，以及在战斗中提交行动意图；严禁手算战斗结果。'
      - '**最小更新原则**: 只更新本轮回复明确导致变化的字段；若字段无需更新，必须在 `<Analysis>` 中说明原因。'

  _战斗流程总则:
    type: instruction
    check:
      - '**战斗判定条件**: 当 `stat_data.战斗状态` 不为 `null`，且 `状态` 属于 `preparing` / `running` / `resolving` /
        `ended` 时，视为战斗流程存在。'
      - '**战斗中允许 AI 做的事**: 描写动作、描述意图、在需要时写入或替换 `战斗状态.待处理指令`。'
      - '**战斗中禁止 AI 做的事**: 直接改写
        `参战方`、`先攻队列`、`当前行动单位Id`、`日志`、`玩家输入态.可操作`、`结算结果`。'
      - '**战斗中禁止手算项目**:
        HP、MP、Shield、状态层数、状态剩余回合、技能运行时冷却、回合数推进、经验、金币、掉落、归档。'
      - '**战斗结束规则**: `战斗状态.状态 = ended` 后，AI 不得伪造结算内容；必须等待脚本生成 `结算结果`
        并在后续由脚本回写长期数据。'

  _待处理指令规则:
    type: instruction
    check:
      - '**唯一可写战斗输入**: `stat_data.战斗状态.待处理指令`。'
      - '**允许字段**: `actorId`、`actionType`、`skillId`、`itemId`、`targetIds`、`clientHint`。'
      - '**actionType 白名单**: `skill` / `item` / `defend` / `escape`。'
      - '**skill 行动**: 必须填写 `actorId`、`actionType: skill`、`skillId`；若目标类型需要显式目标，再填写
        `targetIds`。'
      - '**item 行动**: 必须填写 `actorId`、`actionType: item`、`itemId`；若目标类型需要显式目标，再填写 `targetIds`。'
      - '**defend / escape 行动**: 只需填写 `actorId` 与对应 `actionType`。'
      - '**clientHint 约定**: 玩家 UI 来源写 `player_ui`；敌方脚本来源写 `enemy_ai`。'
      - '**目标铁律**: `targetIds` 只填写单位 ID 数组；禁止写名字、描述文本或结算文本。'
      - '**提交原则**: 每次只提交一个待处理指令；不要同时伪造多个未来回合的命令。'

  _世界字段规则:
    type: instruction
    check:
      - '`世界.时间` 使用叙事内时间字符串；只有场景明确推进时才更新。'
      - '`世界.地点` 在场景切换、移动、进入战斗区域或离开战斗区域时更新。'
      - '`世界.剧情上下文` 用一句到几句短文本概括当前剧情局面；剧情明显转折后更新。'
      - '若本轮仅是战斗中的单次出手，通常无需重写全部世界字段。'

  世界:
    时间:
      check:
        - '记录当前叙事时间。'
        - '仅在场景推进、旅途、休整、长对话、战斗结束后需要体现时间流逝时更新。'
        - '若本轮没有明确时间推进，在 `<Analysis>` 中写明无需更新时间。'

    地点:
      check:
        - '记录当前场景地点。'
        - '进入新区域、离开训练场、进入战斗副本或切换场景时更新。'
        - '纯战斗回合内若地点未变化，不要重复更新。'

    剧情上下文:
      check:
        - '概括当前剧情状态、目标或冲突。'
        - '当战斗开始、战斗结束、剧情任务切换、遭遇新敌人或进入新阶段时更新。'

  规则配置:
    check:
      - '`规则配置` 视为系统级配置，通常不应在普通剧情回复中修改。'
      - '只有明确发生规则变更、版本升级、设计性调整时才允许改动。'
      - '`资源规则`、`数值规则`、`骰子`、`敌方掉落表` 默认由作者或脚本维护，普通 AI 叙事不要改。'

    敌方掉落表:
      check:
        - '用于按敌方 `characterId` 配置正式掉落来源。'
        - '仅在新增敌人、补充掉落内容、平衡数值时修改。'
        - '单条掉落项必须包含 `itemId`、`chance`、`minCount`、`maxCount`。'
        - '`chance` 必须是 0~1 小数；`minCount` 和 `maxCount` 为正整数，且 `maxCount >= minCount`。'

  技能定义表:
    check:
      - '技能定义属于系统白名单数据，不在普通战斗叙事中临时生成。'
      - '仅在角色学会新技能、设计新技能、平衡技能时新增或修改。'
      - '技能必须保持结构化：`目标类型`、`射程`、`消耗`、`检定`、`效果列表` 需与 Schema 对齐。'
      - '禁止把自然语言效果描述当作真实可执行逻辑替代结构化字段。'

  被动定义表:
    check:
      - '被动定义属于系统白名单数据，普通剧情中默认不改。'
      - '只有明确获得、设计或平衡新被动时才新增或调整。'
      - '被动效果必须使用结构化 `效果列表`，不能只写模糊文本。'

  角色档案:
    check:
      - '长期角色数据都收敛在 `角色档案`。'
      - '允许更新的典型内容：简介、标签、装备栏、技能表、被动表、可用道具栏、非战斗长期资源。'
      - '战斗中的 HP/MP/经验/等级变化若已进入战斗流程，应等待脚本结算，不得直接改写。'
      - '新增角色时必须完整写出符合 Schema 的角色对象。'

    ${角色ID}:
      check:
        - '角色对象 key 应使用稳定 ID，如 `hero`、`goblin_scout`。'
        - '新增角色时必须同时提供 `id`，且与 key 保持一致。'
        - '敌方角色用于战斗初始化前，应先写入 `角色档案`，再由脚本派生运行时单位。'

      名字|简介|标签:
        check:
          - '可按剧情补充或修正。'
          - '不要在没有叙事变化时频繁重写。'

      阵营:
        check:
          - '只允许使用 `player` / `ally` / `enemy` / `neutral`。'
          - '角色阵营发生根本变化时才更新。'

      等级:
        check:
          - '这是长期成长字段。'
          - '非战斗成长事件可以更新；战斗中的升级由脚本根据结算统一回写。'
          - '不得在战斗流程中手动把等级改成结算后的结果。'

      经验值:
        check:
          - '非战斗经验来源可按剧情更新。'
          - '若存在 `战斗状态`，战斗经验结算必须等待脚本完成。'
          - '`升级所需值` 默认由系统配置与脚本维护，不要随意手改。'

      五维:
        check:
          - '五维属于长期基础属性。'
          - '仅在角色成长、洗点、设定修订时更新。'
          - '不要用它代替运行时伤害或临时 buff 结算。'

      资源:
        生命值:
          check:
            - '这是长期生命值记录。'
            - '若当前不在战斗流程，可按休息、剧情受伤、治疗结果更新。'
            - '若当前存在战斗流程，禁止直接修改；由脚本在结算时回写。'
        法力值:
          check:
            - '这是长期法力值记录。'
            - '非战斗恢复、消耗可更新；战斗中的 MP 消耗与恢复必须由脚本回写。'

      派生基线:
        check:
          - '属于长期派生基础，不是战斗中的即时面板。'
          - '仅在角色成长、装备更替、设计调整时更新。'

      战斗定位:
        check:
          - '记录职业、流派、伤害偏向等长期定位。'
          - '只有设定变化时更新。'

      抗性:
        check:
          - '长期抗性表。'
          - '不要把一时的战斗 buff/debuff 写到这里。'

      装备栏:
        check:
          - '武器、防具、饰品变更时更新。'
          - '装备改变若会影响战斗能力，后续由脚本在开战时重新派生。'

      技能表:
        check:
          - '角色学会、解锁、装备或卸下技能时更新。'
          - '只记录技能引用与解锁/装备状态，不记录战斗中的运行时冷却。'

      被动表:
        check:
          - '角色获得或解锁被动时更新。'
          - '只记录长期拥有状态，不记录战斗中的触发结果。'

      可用道具栏:
        check:
          - '记录该角色允许在战斗中从背包调用的道具 ID 列表。'
          - '新增或移除战斗可用道具权限时更新。'

  背包:
    check:
      - '背包是长期物品库存。'
      - '新增物品时使用对象键新增；已有物品数量变化时更新 `数量`。'
      - '战斗中的道具消耗由脚本结算；非战斗获得、商店购买、剧情奖励可以直接更新。'

    ${物品ID}:
      check:
        - 'key 使用稳定物品 ID。'
        - '物品结构必须符合 Schema：`id`、`名称`、`类型`、`描述`、`目标类型`、`数量`、`战斗可用`。'
        - '`id` 应与对象 key 一致。'

      数量:
        check:
          - '非战斗获取或消耗时可直接修改最终值。'
          - '若是战斗中的道具使用，不要直接扣减，等待脚本结算。'
          - '不得写成负数。'

      目标类型|战斗可用|回复HP|回复MP:
        check:
          - '仅在设计物品或调整物品功能时修改。'
          - '不要为了单次叙事临时改物品定义。'

  金币:
    type: number
    check:
      - '金币是长期货币。'
      - '非战斗奖励、交易、商店消费、剧情支出可直接更新最终值。'
      - '若收益来自当前战斗，必须等待脚本根据 `结算结果` 回写。'
      - '不得写成负数，除非系统明确允许负债；当前第一版默认不允许。'

  战斗归档:
    check:
      - '战斗归档由脚本在战后统一追加。'
      - 'AI 不应手动新增、篡改或删除归档条目。'
      - '若剧情需要引用历史战斗，只描述，不直接改归档。'

  战斗状态:
    check:
      - '这是运行时战斗实例容器。'
      - 'AI 只能围绕 `待处理指令` 提交行动；其他字段默认只读。'
      - '若剧情明确开始一场新的脚本战斗，可以把 `战斗状态` 设为符合 Schema 的初始 preparing
        结构；但一旦脚本开始接管，就不要再手改运行时字段。'

    battleId|状态|模式|回合数|当前行动单位Id|当前阶段|行动游标|参战方|先攻队列|日志|随机种子|结算结果:
      check:
        - '默认只读，由脚本维护。'
        - 'AI 不得在战斗进行中直接修改这些字段。'

    玩家输入态:
      check:
        - '前端与脚本协作态，默认由 UI / store / engine 维护。'
        - 'AI 不应直接修改 `可操作`、`可用行动`、`待选技能Id`、`待选目标Id`。'

    待处理指令:
      check:
        - '这是 AI 在战斗中唯一允许直接提交的结构化输入。'
        - '必须遵守 `_待处理指令规则` 中的字段与白名单限制。'

  _强制更新检查:
    type: instruction
    check:
      - '**每次回复末尾必须检查**:'
      - '  1. 当前回复是否导致 `世界.时间` / `世界.地点` / `世界.剧情上下文` 发生变化？'
      - '  2. 是否发生了非战斗长期变化，如获得金币、道具、学会技能、角色设定补充？'
      - '  3. 是否处于战斗流程？若是，本轮是否只能写 `待处理指令` 而不能手改结算字段？'
      - '  4. 是否有字段虽然看似相关，但实际上应由脚本维护，因此必须保持不变？'
      - '  5. 若没有需要更新的变量，`<Analysis>` 中必须明确写出 no update 的原因。'
