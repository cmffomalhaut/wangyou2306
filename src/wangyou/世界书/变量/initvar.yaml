技能定义表:
  basic_attack:
    id: basic_attack
    名称: 普通攻击
    类型: 主动
    标签: [physical]
    描述: 使用武器或拳脚造成一次基础攻击。
    目标类型: single_enemy
    射程: melee
    消耗:
      MP: 0
      HP: 0
      冷却回合: 0
      行动点: 1
    检定:
      类型: attack_roll
      攻击属性: 力量
      对抗防御: 护甲等级
      命中加值: 0
    效果列表:
      - kind: damage
        scale: 力量
        ratio: 1.1
        flat: 4
        damageType: slash
    AI约束:
      使用倾向: attack
      推荐时机: 默认出手技能
  fire_bolt:
    id: fire_bolt
    名称: 火焰箭
    类型: 主动
    标签: [magic, debuff]
    描述: 发射一枚火焰箭，对敌人造成法术伤害并有概率附加灼烧。
    目标类型: single_enemy
    射程: ranged
    消耗:
      MP: 6
      HP: 0
      冷却回合: 1
      行动点: 1
    检定:
      类型: attack_roll
      攻击属性: 智力
      对抗防御: 精神防御
      命中加值: 2
    效果列表:
      - kind: damage
        scale: 智力
        ratio: 1.4
        flat: 8
        damageType: fire
      - kind: apply_status
        statusId: burn
        chance: 0.45
        duration: 2
        power: 5
    AI约束:
      使用倾向: burst
      推荐时机: 需要压低敌方血量时
  guard_stance:
    id: guard_stance
    名称: 守势
    类型: 主动
    标签: [buff]
    描述: 架起防守姿态，获得短暂护盾。
    目标类型: self
    射程: melee
    消耗:
      MP: 3
      HP: 0
      冷却回合: 2
      行动点: 1
    检定:
      类型: auto_hit
    效果列表:
      - kind: shield
        scale: 体质
        ratio: 1.2
        flat: 8
        duration: 2
    AI约束:
      使用倾向: survive
      推荐时机: 自身生命偏低时
  holy_light:
    id: holy_light
    名称: 圣光疗愈
    类型: 主动
    标签: [heal, support]
    描述: 回复己方生命值。
    目标类型: single_ally
    射程: ranged
    消耗:
      MP: 8
      HP: 0
      冷却回合: 1
      行动点: 1
    检定:
      类型: auto_hit
    效果列表:
      - kind: heal
        scale: 感知
        ratio: 1.8
        flat: 12
    AI约束:
      使用倾向: support
      推荐时机: 己方生命低于一半时
  blizzard:
    id: blizzard
    名称: 暴风雪
    类型: 主动
    标签: [magic, aoe]
    描述: 召唤暴风雪席卷全体敌人，造成冰霜伤害并有概率冻结。
    目标类型: all_enemies
    射程: global
    消耗:
      MP: 14
      HP: 0
      冷却回合: 3
      行动点: 1
    检定:
      类型: saving_throw
      豁免属性: 敏捷
      基础DC: 12
    效果列表:
      - kind: damage
        scale: 智力
        ratio: 1.2
        flat: 10
        damageType: ice
      - kind: apply_status
        statusId: freeze
        chance: 0.35
        duration: 1
        power: 0
    AI约束:
      使用倾向: control
      推荐时机: 敌方多人时优先
  aegis_wall:
    id: aegis_wall
    名称: 神盾壁垒
    类型: 主动
    标签: [buff, support]
    描述: 为全体我方单位施加护盾。
