战斗状态:
  battleId: demo-battle-001
  状态: preparing
  模式: pve
  回合数: 1
  当前阶段: turn_start
  行动游标: 0
  参战方:
    ally:
      阵营名: 我方
      单位列表: []
    enemy:
      阵营名: 敌方
      单位列表: []
  先攻队列: []
  日志: []
  玩家输入态:
    可操作: false
    可用行动: [skill, item, defend, escape]
