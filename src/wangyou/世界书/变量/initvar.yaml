    简介: 拿着锈刀四处游荡的哥布林。
    标签: [敌人, 哥布林]
    等级: 2
    经验值:
      当前值: 0
      升级所需值: 100
    五维:
      力量: 8
      魅力: 4
      体质: 8
      智力: 5
      精神: 4
    资源:
      生命值:
        当前值: 72
        最大值: 72
      法力值:
        当前值: 6
        最大值: 6
    派生基线:
