      - slotId: s2
        skillId: fire_bolt
        已装备: true
        已解锁: true
        来源: 初始
      - slotId: s3
        skillId: holy_light
        已装备: true
        已解锁: true
        来源: 初始
      - slotId: s4
        skillId: guard_stance
        已装备: true
        已解锁: true
        来源: 初始
    被动表:
      - slotId: p1
