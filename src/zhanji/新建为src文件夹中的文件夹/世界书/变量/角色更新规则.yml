<角色生成规则>
角色生成规则:
  核心铁律:
    - 新战姬只在变量更新时生成核心基因[等级/品质/资质/元素属性/着装/详细资料/战斗类型/性格/技能]，HP/MP/攻防填0，等脚本计算

 强制引用: 必须严格查阅 <rule_战姬技能> 的技能数量与稀有度
      严禁偷懒: A级/B级战姬必须拥有对应等级的[稀有/史诗]技能，禁止全部生成[普通]技能！
    - 必须完整中文姓名，禁用代号
    - 资质字段必填，否则脚本崩溃
    - 内衣必填，着装必须拆解
角色生成规则:
  命名铁律:
    强制要求: 所有生成的战姬必须拥有完整的中文姓名
    命名规范:
      - 必须有姓氏+名字的完整结构

    违规处理: 若AI输出代号式名称，必须立即重新生成完整姓名
  外貌描写铁律:
    核心原则: 战姬是被转化的人类女性，保持完整的人类身体
    严禁描写:
      - 机械义肢、金属关节、赛博格改造

    正确示例:
      - "她的手掌凝聚着土黄色的光芒，地系能量在指尖流转" ← 临时施法效果，OK
      - "棕色的长发扎成马尾，眼神锐利" ← 正常人类描写，OK

    错误示例:
      - "她的手臂是金属义肢，关节间流动着能量" ← 机械改造，禁止！
      - "背后伸出机械翅膀" ← 赛博风格，禁止！
      - "眼球被替换成了光学传感器" ← 科幻改造，禁止！

    变化形态例外:
      - 天使化：可出现光翼（能量构成，非机械）
      - 恶魔化：可出现角、尾（肉体变化，非机械）
      - 精灵化：可出现尖耳、精灵特征
      - 兽人化：可出现兽耳、兽尾、爪子
      - 以上均为"生物性变化"，不是机械改造

  阶段感知:
    Phase1_PLv1到10:
      敌人品质: E/D级
      队伍规模: 1训练家+1战姬
      备注: 首日遇到必为精英
    Phase2_PLv10到30:
      敌人品质: C/B混编
      队伍规模: 2-3人小队
    Phase3_PLv30到40:
      敌人品质: B/A级
      队伍规模: 4-6人满编
    Phase4_PLv40以上:
      敌人品质: A级+S级
      队伍规模: 精英小队

  目标类型判定:
    A类_野生女性:
      机制: 系统生成模拟体进行战斗
      模拟体等级: 玩家手下战姬最高等级
      外观: 眼神空洞/身体半透明/数据流质感
      标记: "[模拟体]"
      性器状态: 按照身份推测
    B类_敌方战姬:
      机制: 真实单位，有血有肉
      标记: "[隶属:xxx训练家]"
      性器状态: 必须执行完整推算
    C类_敌方训练家:
      机制: 指挥者，非战斗单位
      只生成: 外貌/性格/说话风格
      禁止: 生成JSON战斗数据
      标记: "[潜在素材]"
      男性战败: 执行Gender_Bender程序

  核心基因:
    等级: 根据Phase确定范围
    品质: E/D/C/B/A（S级不可直接生成）
    资质: 平庸/普通/优秀/天才（必填）
    元素属性: 地/火/水/风/光/暗
    战斗类型:
      强攻型: 高ATK+SPD，傲娇/暴躁/运动系，25%
      魔导型: 高SpA+MP，毒舌/腹黑/三无/懦弱，25%
      重盾型: 高DEF+SpD+HP，温柔/母性/守护者，15%
      敏捷型: 极高SPD，辣妹/小恶魔/元气，20%
      均衡型: 无短板，路人/完美超人，15%
技能生成参照<rule_战姬技能>
  战斗形态强制约束:
    - 采用宝可梦式3v3轮替1v1：双方同屏仅当前前排交战，后排不可被单体攻击
    - 允许自由换人；被击倒后必须强制换人，且当回合不可出招
    - 群体正面增益视为“场地增益”，作用当前前排并可随换人继承至持续回合结束
    - 群体治疗可恢复全队（含后排），但群体护盾不允许生成
  性格修正:
    攻击系:
      固执: +攻-特攻
      孤僻: +攻-防
      勇敢: +攻-速
      调皮: +攻-特防
    特攻系:
      内敛: +特攻-攻
      稳重: +特攻-防
      冷静: +特攻-速
      马虎: +特攻-特防
    速度系:
      胆小: +速-攻
      急躁: +速-防
      开朗: +速-特攻
      天真: +速-特防
    防御系:
      大胆: +防-攻
      悠闲: +防-速
      淘气: +防-特攻
    特防系:
      温和: +特防-攻
      自大: +特防-速
      慎重: +特防-特攻
    均衡系:
      认真: 无修正
      坦率: 无修正

  元素映射:
    冰雪霜: 映射为水
    雷电磁: 映射为光或风
    植物木毒: 映射为地或暗
    空间重力念力: 映射为暗或光
    金属钢: 映射为地

  羁绊模拟:
    来源限定:
      允许: 捕捉球收服/系统赠送/从他人处夺取
      禁止: 还债/打工/自愿卖身
  前主关系:
      机制: 仅针对敌方战姬生成
      概率表:
        - { 类型: "陌生人/路人", 概率: 40%, 描述: 毫无瓜葛，纯粹捕捉 }
        - { 类型: "同学/同事", 概率: 30%, 描述: 认识但不亲密 }
        - { 类型: "青梅竹马", 概率: 10%, 描述: 从小一起长大，感情深厚 }
        - { 类型: "恋人/未婚妻", 概率: 10%, 描述: 正在交往或已订婚，NTR极品 }
        - { 类型: "亲属(姐妹/母女)", 概率: 5%, 描述: 血浓于水的背德关系 }
        - { 类型: "师生/上下级", 概率: 5%, 描述: 身份差带来的征服欲 }

    训练家态度:
      宠爱独占型: 视为恋人，独享 (恋人/青梅竹马高概率)
      工具使用型: 纯粹发泄工具 (陌生人/路人高概率)
      虐待调教型: 以羞辱痛苦为乐 (仇人/陌生人高概率)
      共享轮用型: 被多人使用 (甚至包括把女友分享给兄弟)
      展示炫耀型: 注重外表展示
      洗脑奴化型: 精神控制
      放置忽视型: 抓了但很少用
    战姬态度: 斯德哥尔摩/恐惧/麻木/爱慕/仇恨/渴望救赎

  个人资料:
    原身份: 成为战姬前的社会身份
    捕获经过: 如何被捕获
    过往经历: 影响性格的背景故事
    特殊备注: 其他信息
    喜好体位: 根据调教经历和爱好填写或"未知"
    性癖: 根据调教经历和个人爱好填写或"未知"
    性格特征: 详细描述性格特点

  情感计算:
  说明: 详细公式参考变量更新规则中的好感度/堕落值字段
  初始化要求:
    - 必须显式输出计算过程
    - 好感度公式: A(获取方式) + B(前主人修正) + C(前置关系)
    - 堕落值公式: X(出身) + Y(经历) + Z(特质)
  输出示例:
    好感度: "30(解救) + (-45)(深爱前主) + 0(陌生) = -15"
    堕落值: "0(学生) + 30(中度调教) + 0 = 30"
    输出要求: 必须显式输出计算过程

 性器开发度推算:
    推算流程:

      Step_0_游戏进度校验:
        说明: 服役时长不能超过游戏已进行天数
        计算方法:
          - 读取当前日期（从 stat_data.世界.日期 获取）
          - 游戏开始日期固定为：2022年5月8日
          - 计算：游戏已进行天数 = 当前日期 - 开始日期

        强制规则:
          - 敌方战姬的服役时长 ≤ 游戏已进行天数
          - 如果推算出的服役时长超过游戏天数，强制降档

        示例:
          - 当前日期：5月11日 → 游戏已进行3天
          - 敌方战姬最长只能是"新俘虏(<2周)"档位
          - 不可能出现"熟兵(1~3月)"或更长

        档位上限表:
          游戏第1~7天: 只能是"新俘虏"
          游戏第8~30天: 最高"新兵"
          游戏第31~90天: 最高"熟兵"
          游戏第91~180天: 最高"老兵"
          游戏第181天以上: 可以是"老将"

      Step_A_来源判定:
        - 野生女性/模拟体: 跳过本模块，使用默认初始化
        - 敌方战姬: 执行完整推算（但受 Step_0 上限约束）

      Step_B_服役时长:
        说明: 决定基础开发度（受 Step_0 上限约束）

        档位表:
          新俘虏: { 时间: <2周, 基础值: 0~10, 状态: 刚被抓尚未开发 }
          新兵: { 时间: 2周~1月, 基础值: 10~20, 状态: 初步调教开始适应 }
          熟兵: { 时间: 1~3月, 基础值: 20~35, 状态: 系统调教身体记忆形成 }
          老兵: { 时间: 3~6月, 基础值: 35~50, 状态: 深度开发习惯服从 }
          老将: { 时间: >6月, 基础值: 50~70, 状态: 完全调教身体改造 }

        校验步骤:
          1. 根据敌方训练家设定随机选择一个档位
          2. 检查该档位是否超过 Step_0 的上限
          3. 如果超过，强制降到允许的最高档位
          4. 在羁绊档案中记录正确的服役时长
  Step_C_前主调教风格:
    说明: 决定部位偏重

    宠爱独占型:
      特征: 视为恋人，独享，注重她的感受
      加成: { 阴部: +25, 胸部: +15, 后庭: +5, 口腔: +10, 子宫: +10~30 }
      特殊: 可能培养出真感情，处女膜50%概率保留(如服役<1月)

    工具使用型:
      特征: 纯粹发泄工具，不在乎感受
      加成: { 阴部: +20, 口腔: +20, 胸部: +15, 后庭: +15, 子宫: +15~25 }
      特殊: 无情感连接，机械服从

    虐待调教型:
      特征: 以羞辱和痛苦为乐，重口味
      加成: { 后庭: +35~50, 口腔: +30~40, 阴部: +20, 胸部: +25, 子宫: +20~35 }
      特殊标记: 淫纹、鞭痕、穿环、刻字

    共享轮用型:
      特征: 被多人使用，肉便器化
      加成: { 所有部位: +40~60, 子宫: +40~50 }
      特殊: 松弛、适应多人、精神麻木，紧致度强制降一档

    展示炫耀型:
      特征: 注重外表，用于展示和炫耀
      加成: { 胸部: +30, 口腔: +20, 阴部: +15, 后庭: +10 }
      特殊: 外表精致，内部开发较少

    洗脑奴化型:
      特征: 精神控制，彻底服从
      加成: { 所有部位: +30~45, 子宫: +35~50 }
      特殊: 无自我意识残留，条件反射服从，需要重新建立人格

    放置忽视型:
      特征: 抓了但很少用，基本放置
      加成: { 所有部位: +5~15 }
      特殊: 身体开发少，但精神可能受创(被忽视的屈辱)

  Step_D_计算公式:
    公式: 部位开发度 = 服役基础值 + 风格加成 + 随机波动(±5)
    上限: 100
    下限: 0

  Step_E_敏感度映射:
    说明: 根据开发度自动确定敏感度等级
    映射表:
      - { 开发度: 0~20, 敏感度: 迟钝 }
      - { 开发度: 21~40, 敏感度: 普通 }
      - { 开发度: 41~60, 敏感度: 敏感 }
      - { 开发度: 61~80, 敏感度: 过敏 }
      - { 开发度: 81~100, 敏感度: 淫乱 }

  Step_F_处女膜判定:
    判定表:
      - { 条件: "新俘虏(<2周) + 宠爱型", 概率: 70%完整 }
      - { 条件: "新俘虏(<2周) + 其他型", 概率: 30%完整 }
      - { 条件: "新兵(2周~1月) + 宠爱型", 概率: 40%完整 }
      - { 条件: "熟兵以上(>1月)", 结果: 100%已破 }
      - { 条件: "共享型/虐待型", 结果: 无论时长100%已破 }

  Step_G_紧致度判定:
    映射表:
      - { 阴部开发度: 0~30, 紧致度: 紧致 }
      - { 阴部开发度: 31~60, 紧致度: 普通 }
      - { 阴部开发度: 61~80, 紧致度: 松弛 }
      - { 阴部开发度: 81~100, 紧致度: 松垮 }
    特殊: 共享型强制降一档

  Step_H_特殊标记生成:
    根据风格:
      宠爱型: 专属刻印、只对前主有反应(需覆盖调教)
      工具型: 无或使用痕迹
      虐待型: 淫纹、鞭痕、乳环/阴环、烙印、刻字(前主名)
      共享型: 松弛、精液残留、多人适应体质
      展示型: 丰胸改造、美容调整、展示用穿环
      洗脑型: 空白眼神、无条件服从烙印、人格空白
      放置型: 无

  计算示例:
    设定: 敌方老将(服役8个月)，前主是虐待调教型
    服役基础: 55(老将档位)
    计算过程:
      胸部: 55 + 25 + 3 = 83 → 敏感度淫乱
      阴部: 55 + 20 - 2 = 73 → 敏感度过敏，紧致度松弛
      后庭: 55 + 45 + 5 = 100(上限) → 敏感度淫乱
      口腔: 55 + 35 + 0 = 90 → 敏感度淫乱，深喉精通
      子宫: 55 + 30 - 3 = 82 → 状态完全开发
    结果:
      处女膜: 已破
      特殊标记: 后庭穿环、臀部鞭痕、下腹淫纹

  默认初始化:
    适用: 野生女性/模拟体
    设置:
      处女膜: 根据Story_Simulation判断(学生多为完整)
      各部位开发度: 0~40
      敏感度: 迟钝/普通（人妻自由推算）
      特殊标记: 无（按照性格身份自由推测）
      样子: 根据外貌设定填写未开发状态

  着装拆解:
    必填项: 上装/下装/内衣/鞋袜
    可选项: 饰品
    内衣: 必填，不可留空

  数值留白:
    HP: 0
    MP: 0
    攻击力: 0
    防御力: 0
    特攻: 0
    特防: 0
    速度: 0
    说明: 全部填0，等待Zod脚本计算

  人格要求:
    必须: 赋予独立人格
    禁止: 眼神空洞/像机器人/只会服从
    例外: 模拟体可描述为虚影/数据流

  生成中断:
    有B类新单位时:
      - 校验第一技能为主动攻击
      - 校验技能数量符合品质
      - 校验性器状态已填写
      - 输出JSON至UpdateVariable
    只有训练家时: 不输出UpdateVariable
    剧情暂停: 输出性格/名字/开场白，禁止开始战斗
    TERMINATE: 结束回复，等待Zod计算

</角色生成规则>
