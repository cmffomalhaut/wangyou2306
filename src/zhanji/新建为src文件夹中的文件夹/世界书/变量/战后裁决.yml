  随机性体现:
    - "逃跑判定使用随机数（如'生成随机数：67'）"
    - "捕捉率判定使用随机数"
    - "训练家性格影响选择（骄傲型更可能继续战斗，胆小型更可能撤退）"
    - "战姬意志影响逃跑（深爱主人的战姬更可能逃跑成功）"

  调用其他规则:
    捕捉判定: "参照<rule_战姬捕捉>"
    好感度初始化: "参照<角色生成规则>的好感度计算公式"
    性器状态: "参照<角色生成规则>的性器开发度推算流程"

