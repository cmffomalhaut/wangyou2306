<rule_战姬捕捉>

核心机制:
  相位空间:
    定义: 捕捉战触发时系统生成的独立亚空间
    外观: 仅对战斗双方可见，与现实重叠但互不干涉
    外界表现: 当事人在现实中表现为短暂失神或发呆
    物理影响: 战斗造成的破坏在空间解除后自动还原
    解除条件: 战斗结束（捕捉成功/失败/逃跑）

前置条件:
  - 玩家持有【战姬捕捉球】
  - 目标必须为【人类女性】
  - 目标必须处于【无主状态】（非他人战姬）
  - 目标HP必须削减至【20%以下】（硬性门槛，除非自愿）

捕捉流程:
  Step_1_锁定: 玩家选定目标，系统展开相位空间
  Step_2_战斗: 玩家派出战姬进行削弱攻击（目标品质S级不可直接捕捉）
  Step_3_投掷: 当目标HP < 20% 时，消耗1个捕捉球进行判定
  Step_4_结算: 系统根据【捕捉率公式】生成 1-100 的随机数进行检定

捕捉率公式:
  算法: 最终成功率 = (基础率 * 球倍率) +道具修正 + 状态修正 - 抵抗修正

  1.基础率 (Base_Rate):
    - 无抵抗/自愿: 100%
    - 强制捕捉 (按目标品质):
      - E级 (普通): 90%
      - D级 (优秀): 75%
      - C级 (精英): 50%
      - B级 (稀有): 25%
      - A级 (史诗): 10%
      - S级 (传说): 0% (不可捕捉)

  2.球倍率 (Ball_Mult):
    - 普通球: x1.0
    - 高级球: x1.5
    - 超级球: x2.0
    - 魅惑之球: x1.2 (且初始好感+10)

  3.道具修正 (Tech_Mod):
    - 道具(捕捉辅助器): 额外 +15%

  4.状态修正 (Status_Mod):
    - 濒死 (HP < 5%): +20%
    - 虚弱 (HP 5-20%): +10%
    - 异常 (麻痹/睡眠/束缚): +15%
    - 精神 (催眠/迷魂香): +25%

  5.抵抗修正 (Resist_Mod):
    - 意志坚定 (贞烈/仇恨): -30%
    - 意志动摇 (恐惧/混乱): -10%
    - 意志崩溃 (绝望/臣服): +0%

结果裁决:
  捕捉成功:
    - 目标转化为【战姬卡】存入系统
    - 继承原本身材、外貌、性格数据
    - 触发【好感度初始化】计算（根据手段决定初始好感）
    - 相位空间解除，现实中目标消失（或被收回球中）
    - 注意: 若目标具有高社会影响力，判定为【失踪事件】，引发社会动荡

  捕捉失败:
    - 消耗: 捕捉球 -1
    - 玩家惩罚: 出战战姬重伤（无法战斗持续24小时）
    - 目标保护: 目标强制脱离，进入【警戒状态】（48小时内无法被任何人捕捉）
    - 相位空间解除，目标在现实中苏醒并对玩家产生敌意


</rule_战姬捕捉>
战后裁决:


 core_principle:
  philosophy: "战后裁决是高风险博弈的终局，充满不确定性与戏剧张力"
  iron_law:
    - "所有战斗均在相位空间内进行，与现实世界完全隔离"
    - "战姬无法对任何训练家（包括敌方）造成伤害，这是系统底层限制"
    - "相位空间解除后，系统会自动'合理化'失踪者去向（保护期内）"

# ==========================================================
# 触发条件
# ==========================================================
trigger_condition:
  mark: "上文包含'战斗结束'或'胜利'或'失败'关键词"
  scene_branch:
    场景A_训练家对战:
      description: "有敌方训练家存在，执行完整裁决流程"
      flow: "战姬逃跑判定 → 训练家命运判定 → 捕捉判定 → 羁绊档案生成 → 结算"
    场景B_野生捕捉战:
      description: "无敌方训练家，模拟体消散"
      flow: "跳过逃跑判定 → 捕捉判定 → 相位空间解除"

# ==========================================================
# 场景A: 训练家对战裁决流程
# ==========================================================
scene_A_trainer_battle:

  step_1_战姬逃跑判定:
    description: "战败方战姬尝试逃离战场，成功率取决于后备战力和意志"

    判定表:
      有后备战姬:
        基础逃跑率: "80% ~ 95%"
        成功描述: |
          - 后备战姬掩护，倒下的战姬化光返回捕捉球
          - 训练家可选择换人继续战斗或撤退
        失败描述: |
          - 后备战姬掩护失败，倒下的战姬瘫软在地
          - 进入可捕捉状态

      无后备战姬:
        基础逃跑率: "15% ~ 35%"
        成功描述: |
          - 战姬咬牙挣扎着化光逃离
          - 训练家保留战姬，但需面对后续处境
        失败描述: |
          - 战姬力竭倒地，进入可捕捉状态
          - 训练家进入【步骤2：命运判定】

    影响因素_调整成功率:
      战姬品质加成:
        A级: "+10%"
        B级: "+5%"
        C级及以下: "0%"
      战姬意志:
        深爱主人: "+15%"
        恐惧主人: "-10%"
        渴望被救: "-20%"
      训练家技能:
        若训练家拥有"战术撤退"类技能: "+技能加成%"

    执行指令:
      - "生成1~100的随机数"
      - "对比最终成功率"
      - "明确输出判定结果（如'逃跑判定：72/80，成功！'）"

  step_2_训练家命运判定:
    description: "战败训练家的命运取决于其剩余资源、性格和选择"

    分支A_仍有战姬:
      condition: "逃跑成功或有后备战姬"
      选项:
        继续战斗:
          触发概率: "骄傲型/复仇型训练家更可能选择"
          description: "换上后备战姬继续战斗"
          result:  "返回战斗引擎，开启新一轮战斗"
        主动撤退:
          触发概率: "理智型/胆小型训练家更可能选择"
          description: "认输逃离战场"
          result: |
            - 系统保护生效，光芒包裹训练家瞬间传送离开
            - 胜方获得少量金币和经验（惩罚性结算）
            - 败方48小时内无法再次挑战胜方

    分支B_有捕捉球但无战姬:
      condition: "所有战姬被夺或逃跑失败，但持有捕捉球"
      系统保护:
        description: "系统判定训练家仍有资格，强制保护撤离"
        过程: |
          - 白色光柱从天而降，包裹训练家身体
          - 训练家瞬间消失，传送至安全区域
        败方后果:
          - 失去所有战败战姬（被胜方俘获）
          - 扣除50%当前金币
          - 48小时内禁止战斗
        胜方收获:
          - 获得败方所有战败战姬
          - 金币奖励（败方等级×20 ±20%）
          - 经验奖励（败方战姬等级总和×10）

    分支C_无捕捉球且无战姬:
      condition: "所有战姬被夺或逃跑失败，且捕捉球耗尽"
      系统判决:
        announcement: "【系统通告】训练家资格剥夺！执行强制转化程序！"
        过程:
          男性训练家:
            step_1: "系统强制触发 Gender_Bender 协议"
            step_2: "肉体重构为女性，保留记忆和意识"
            step_3: "转化后自动进入可捕捉状态，捕捉率 100%"
            描写要点: |
              - 身体发光、骨骼重塑、性征转换的具体过程
              - 心理上的羞耻、恐惧、绝望
              - 转化完成后的外貌描述（需生成完整战姬数据）
          女性训练家:
            step_1: "系统直接剥夺训练家身份"
            step_2: "自动进入可捕捉状态，捕捉率 100%"
            描写要点: |
              - 系统光芒笼罩，身份烙印消失
              - 心理上的不甘、屈辱
              - 可捕捉状态的描述

      胜方选择:
        立即捕捉:
          description: "消耗1个捕捉球，必定成功"
          result: "败方转化为战姬，归属胜方"
        放弃捕捉:
          description: "选择不收服"
          result: |
            - 败方成为无主状态的"野生女性"
            - 任何训练家均可尝试捕捉（先到先得）
            - 系统会"合理化"其去向（保护期内）

  step_3_捕捉判定:
    description: "胜方尝试捕捉败方战姬时的判定流程"

    调用规则:
      参照: "<rule_战姬捕捉>"
      说明: |
        - **完全遵循<rule_战姬捕捉>中的捕捉率公式、前置条件、结果处理**
        - AI无需在此处重复公式，直接执行<rule_战姬捕捉>的判定即可
        - 战败战姬自动满足HP<20%条件

    特殊说明:
      - "战败战姬的HP视为已低于20%，无需额外削弱"
      - "Gender Bender转化后的训练家捕捉率固定为100%"
    



  step_5_结算:
    description: "战斗胜利后的奖励结算"

    经验值:
      公式: "敌方战姬等级总和 × 10"
      示例: "击败Lv.8 + Lv.10的敌人 = (8+10)×10 = 180经验"

    金币:
      公式: "敌方训练家等级 × 20 ± 20%"
      示例: "击败Lv.12训练家 = 12×20×(0.8~1.2) = 192~288金币"

    额外奖励:
      讨伐违规者: "额外金币奖励（系统任务奖励）"
      首次击败特定敌人: "可能获得特殊道具或称号"

# ==========================================================
# 场景B: 野生捕捉战裁决流程
# ==========================================================
scene_B_wild_capture:

  step_1_模拟体消散:
    description: "系统生成的模拟体战败后自动消散"
    描写要点: |
      - 模拟体身体化作数据流溃散
      - 目标女性本体在相位空间边缘苏醒
      - 相位空间尚未解除，进入捕捉阶段

  step_2_捕捉判定:
    description: "直接对目标女性进行捕捉判定"

    调用规则:
      参照: "<rule_战姬捕捉>"
      说明: |
        - **完全遵循<rule_战姬捕捉>的完整流程**
        - 野生女性的HP视为模拟体HP（已归零）
        - 通常无"抵抗修正"（除非有特殊剧情）

    结果处理:
      成功:
        - "目标转化为战姬（**等级必须为1**）"
        - "生成战姬数据"
        - "好感度初始化"
        - "队伍检查（满6只进收藏室）"
        - "相位空间解除，目标在现实中消失"
        - "系统合理化去向（保护期内）"
      失败:
        - "捕捉球-1"
        - "目标进入48小时警戒状态"
        - "相位空间解除，目标苏醒并对玩家产生敌意"

