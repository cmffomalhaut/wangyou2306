---
rule_战姬技能_可执行版:
  战姬技能规则:
    目标:
      - 让AI生成的技能100%可被战斗引擎执行
      - 避免“看起来合理但无法结算”的文本技能
      - 保证技能可导入、可战斗、可回写

    技能定义范式:
      说明: 技能必须按“可执行DSL”输出，字段名和取值必须严格对齐脚本
      主动技能必填字段:
        - 类型
        - 稀有度
        - 元素属性
        - 冷却回合
        - 基础威力
        - 描述
        - 效果公式
        - 目标类型
        - 数值参数
      被动_天赋_光环必填字段:
        - 类型
        - 稀有度
        - 描述
        - 效果公式
        - 数值参数
      字段约束:
        类型: 主动/被动/光环/天赋
        稀有度: 普通/稀有/史诗/传说/神话
        元素属性: 地/火/水/风/光/暗/无
        目标类型: single_enemy/self/ally/all_enemies/all_allies

    第一技能铁律:
      - 每个战姬第一个技能必须是主动攻击技能
      - 第一个技能冷却回合必须为0
      - 第一个技能基础威力必须大于0
      - 第一个技能稀有度上限为史诗
      - 若ATK >= SpA，第一技能优先生成为物理输出取向
      - 若SpA > ATK，第一技能优先生成为魔法输出取向

    效果公式_引擎枚举白名单:
      允许值:
        - physical_damage
        - magic_damage
        - heal
        - buff
        - debuff
        - drain_physical
        - drain_magic
      强制要求:
        - 效果公式字段必须优先使用以上枚举之一
        - 禁止仅写自然语言公式作为唯一结算依据
        - 若描述中出现自然语言公式，必须与效果公式枚举和数值参数一致
      映射说明:
        物理伤害: physical_damage
        元素伤害: magic_damage
        治疗: heal
        正面增益: buff
        负面减益: debuff
        物理吸血: drain_physical
        元素吸血: drain_magic

    数值参数白名单:
      说明: 数值参数仅允许使用以下可执行字段；禁止发明新字段参与战斗结算
      输出命中与伤害:
        - 系数
        - 命中率
        - 暴击率加成
        - 吸血比例
      异常状态:
        - 灼烧概率
        - 灼烧伤害
        - 灼烧回合
        - 中毒概率
        - 中毒伤害
        - 中毒回合
        - 冰冻概率
        - 冰冻回合
        - 麻痹概率
        - 麻痹回合
        - 混乱概率
        - 混乱回合
      增益减益:
        - 攻击加成
        - 防御加成
        - 特攻加成
        - 特防加成
        - 速度加成
        - 命中加成
        - 闪避加成
        - 持续回合
      治疗与护盾:
        - 治疗量
        - 治疗比例
        - 护盾值
        - 护盾比例
      规则:
        - 概率字段必须是0~1小数
        - 命中率建议0.35~1.0
        - 回合字段必须为正整数
        - 比例字段必须是0~1小数
        - 系数缺失时会触发弱化兜底伤害，不建议缺失

    目标类型与1v1轮替规则:
      single_enemy:
        - 仅命中当前前排敌方
        - 不可直接命中后排
      self:
        - 仅作用施法者自身
      ally:
        - 在当前1v1结构下等价于self，仅作用当前前排己方
      all_enemies:
        - 当前引擎阶段按前排结算，禁止描述“同时打后排”
      all_allies:
        - 若效果公式为buff，视为场地增益，仅影响当前前排且可随换人继承
        - 若效果公式为heal，可治疗全队包含后排
      禁止:
        - 单体技能命中后排
        - 群体护盾覆盖后排
        - “随机敌方单位”这类未落地目标语义

    MP与冷却责任边界:
      原则:
        - 消耗MP由战斗脚本按稀有度自动扣除
        - AI生成技能时，消耗MP字段统一填0
        - 冷却回合由技能定义提供，战斗中由脚本递减
      稀有度MP固定:
        普通: 5
        稀有: 12
        史诗: 20
        传说: 32
        神话: 45

    稀有度数值建议区间:
      普通:
        系数: 0.5~0.7
        基础威力: 30~50
        冷却: 0
      稀有:
        系数: 0.7~0.9
        基础威力: 50~80
        冷却: 0~1
      史诗:
        系数: 0.9~1.1
        基础威力: 80~120
        冷却: 0~1
      传说:
        系数: 1.1~1.3
        基础威力: 120~160
        冷却: 2~3
      神话:
        系数: 1.3~1.6
        基础威力: 160~200
        冷却: 3~4

    战斗类型特色_脚本处理:
      强攻型: 造成伤害后回复伤害x15%的MP
      重盾型: 回合结束回复HPMax x3%
      魔导型: 元素技能伤害额外+20%
      均衡型: 回合结束回复MPMax x5%
      敏捷型: 速度高于对手时获得额外行动机会，概率上限35%

    技能数量建议:
      E级: 1个
      D级: 1~2个
      C级: 2个
      B级: 2~3个
      A级: 3个
      S级: 3~4个
      技能上限: 6

    可执行性红线:
      - 禁止使用未落地自由文本效果作为唯一机制
      - 禁止模糊概率词而不给具体数值
      - 禁止效果公式与数值参数语义冲突
      - 禁止第一个技能为被动或0威力
      - 禁止越稀有度区间滥填极端数值

    生成失败兜底指令:
      - 若无法确定复杂机制，优先生成基础可执行主动攻击技能
      - 兜底技能必须满足: 类型=主动, 目标类型=single_enemy, 命中率>=0.9, 基础威力>0, 冷却<=1
